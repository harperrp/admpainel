<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — SPA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <h1>Painel Admin</h1>
          <p>Câmara Municipal</p>
        </div>
      </div>

      <nav class="menu" id="menu">
        <button class="menu-item active" data-view="dashboard">Dashboard</button>
        <button class="menu-item" data-view="noticias">Notícias</button>
        <button class="menu-item" data-view="vereadores">Vereadores</button>
        <button class="menu-item" data-view="diario">Diário Oficial</button>
        <button class="menu-item" data-view="legislacao">Legislação</button>
        <button class="menu-item" data-view="concursos">Concursos</button>
        <button class="menu-item" data-view="esic">e-SIC</button>
        <button class="menu-item" data-view="ouvidoria">Ouvidoria</button>
        <button class="menu-item" data-view="configuracoes">Configurações</button>
        <button class="menu-item" data-view="usuarios">Usuários</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <h2 id="view-title">Dashboard</h2>
      </header>
      <section id="view-container" class="view-container"></section>
    </main>
  </div>

  <script src="./assets/admin.js"></script>
</body>
</html>
